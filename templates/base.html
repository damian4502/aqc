<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Air Quality Control{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
        }
        
        .glass {
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover {
            background: rgba(59, 130, 246, 0.15);
            transform: translateX(6px);
        }
        
        .sidebar-link.active {
            background: rgba(59, 130, 246, 0.25);
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex h-screen">
        
        <!-- Izboljšan Sidebar -->
        <div class="w-72 glass border-r border-slate-700 flex flex-col">
            
            <!-- Logo -->
            <div class="px-8 pt-8 pb-10 flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-blue-500 via-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl shadow-lg">AQC</div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tighter text-white">Air Quality</h1>
                    <p class="text-xs text-slate-400 -mt-1">Control System</p>
                </div>
            </div>

            <!-- Navigacija -->
            <nav class="flex-1 px-4">
                <div class="space-y-1">
                    <a href="{% url 'dashboard' %}" 
                       class="sidebar-link flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-200 font-medium {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt w-5"></i>
                        <span>Pregled prostorov</span>
                    </a>
                    
                    <a href="{% url 'monitor' %}" 
                       class="sidebar-link flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-200 font-medium {% if request.resolver_match.url_name == 'monitor' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt w-5"></i>
                        <span>Monitor</span>
                    </a>

                    <a href="{% url 'differential_pressure' %}" 
                       class="sidebar-link flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-200 font-medium {% if request.resolver_match.url_name == 'differential_pressure' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt w-5"></i>
                        <span>Diferencialni tlak</span>
                    </a>

                    <a href="{% url 'trends' %}" 
                       class="sidebar-link flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-200 font-medium {% if request.resolver_match.url_name == 'trends' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt w-5"></i>
                        <span>Trendi</span>
                    </a>

                    <a href="{% url 'import_measurements' %}" 
                       class="sidebar-link flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-200 font-medium">
                        <i class="fas fa-upload w-5"></i>
                        <span>Uvoz meritev</span>
                    </a>
                </div>

                <!-- Dodaten razdelek (lahko kasneje razširimo) -->
                <div class="mt-12 px-6">
                    <p class="text-xs uppercase tracking-widest text-slate-500 mb-3">Analize</p>
                    <div class="text-xs text-slate-400 space-y-2 pl-2">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-chart-line text-blue-400"></i>
                            <span>Trendi</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fas fa-project-diagram text-violet-400"></i>
                            <span>Korelacije</span>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Footer del sidebarja -->
            <div class="p-6 border-t border-slate-700 text-xs text-slate-500">
                <div class="flex items-center justify-between">
					<span><a href="/admin/" target="_blank">Admin</a></span>
                    <span class="text-emerald-400">● Online</span>
                </div>
            </div>
        </div>

        <!-- Glavna vsebina -->
        <div class="flex-1 overflow-auto p-8">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
