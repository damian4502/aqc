{% extends 'base.html' %}
{% load static %}

{% block title %}Diferencialni tlak - Air Quality Control{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold text-white">Live monitor</h1>
        <a href="/dashboard/" class="text-blue-400 hover:text-blue-300 flex items-center gap-2">
            ← Nazaj na pregled
        </a>
    </div>

    <!-- Izbira referenčnega senzorja -->
    <div class="glass rounded-3xl p-6 mb-8">
        <label class="block text-sm text-slate-400 mb-2 font-medium">Parameter</label>
        <select id="ref-sensor" class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3 text-lg">
            <option value="">-- Izberi parameter --</option>
            {% for s in parameters %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>

        <label class="block text-sm text-slate-400 mb-2 font-medium">Prostor</label>
        <select id="add-room" class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3 text-lg">
            <option value="">-- Izberi prostor --</option>
            {% for s in rooms %}
            <option value="delta-row-{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>

        <div class="flex gap-3 mt-6">
            <button onclick="addAllRooms()" 
                    class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-6 py-3 rounded-2xl transition-all active:scale-95">
                ➕ Dodaj vse prostore
            </button>
            <button onclick="removeAllRooms()" 
                    class="flex-1 bg-red-600 hover:bg-red-500 text-white font-medium px-6 py-3 rounded-2xl transition-all active:scale-95">
                🗑️ Odstrani vse
            </button>
        </div>
		</div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Tabela ΔP -->
        <div class="lg:col-span-5 glass rounded-3xl p-6">
            <h2 class="text-lg font-semibold mb-4">Trenutne vrednosti</h2>
            <table class="w-full">
                <thead>
                    <tr class="border-b border-slate-700">
                        <th class="text-left py-3 px-4">Prostor / Senzor</th>
                        <th class="text-right py-3 px-4">Vrednost</th>
                        <th class="text-right py-3 px-4 text-xs">Zadnja meritev</th>
                    </tr>
                </thead>
                <tbody id="delta-table" class="divide-y divide-slate-700"></tbody>
            </table>
        </div>

<!-- Graf in kontrola -->
<div class="lg:col-span-7 glass rounded-3xl p-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold" id="chart-name">Graf vrednosti</h2>
        <div class="flex gap-2">
        </div>
    </div>
    
    <!-- Pomembno: fiksna višina + omejitev Y-osi -->
    <div style="height: 460px;">
        <canvas id="deltaChart"></canvas>
    </div>
</div>
    </div>
</div>




<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let socket;
    let chart;
    let offset = 0;
    let referenceValue = 0;
    let referenceSensorId = null;
    let selectedParameter = null;
    let maxPoints = 300;

    const chartColors = ['#ef4444', '#22c55e', '#3b82f6', '#a855f7', '#f59e0b', '#ec4899', '#06b67f', '#6366f1', '#f97316', '#8b5cf6'];

    function connectWebSocket() {
        socket = new WebSocket('ws://' + window.location.host + '/ws/live/');
        
        socket.onmessage = function(e) {
            try {
                const response = JSON.parse(e.data);
                if (response.type === 'live_update' && response.data) {
                    if (selectedParameter && response.data.parameter_id == selectedParameter) {
                        updateLiveData(response.data);
                    }
                }
            } catch (err) {
                console.error('Parse error:', err);
            }
        };
    }

    function updateLiveData(data) {
        updateDeltaTable(data);
    }

    function updateDeltaTable(data) {
        const tableBody = document.getElementById('delta-table');
        const rowId = 'delta-row-' + data.room_id;
        let row = document.getElementById(rowId);
        
        if (!row) return; // samo ročno dodani prostori

        if (referenceSensorId == data.sensor_id) {
            referenceValue = parseFloat(data.value);
        }

        const currentPressure = parseFloat(data.value).toFixed(2);

        row.innerHTML = `
            <td class="py-4 px-4 font-medium" style="cursor:pointer;">${data.room}</td>
            <td class="text-right py-4 px-4">${currentPressure}</td>
            <td class="text-right py-4 px-4 text-xs text-slate-400">${data.time}</td>
        `;

        row.classList.add('!text-emerald-400');
        setTimeout(() => row.classList.remove('!text-emerald-400'), 300);
        row.addEventListener('click', reloadChart);
    }

    function updateChart() {
        if (!chart) return;
        
        const tableBody = document.getElementById('delta-table');
        const rows = Array.from(tableBody.querySelectorAll('tr'));
        
        if (rows.length === 0) return;

        const time = new Date().toLocaleTimeString('sl-SI', {hour:'2-digit', minute:'2-digit'});

        // Sinhronizacija datasetov (poravnava na desno)
        while (chart.data.datasets.length < rows.length) {
            const color = chartColors[chart.data.datasets.length % chartColors.length];
            chart.data.datasets.push({
                label: 'Prostor',
                data: new Array(chart.data.labels.length).fill(null),
                borderColor: color,
                tension: 0.25,
                borderWidth: 3,
                pointRadius: 0,
                fill: false
            });
        }

        rows.forEach((row, i) => {
            const tds = row.querySelectorAll('td');
            const roomName = tds[0] ? tds[0].textContent.trim() : `Prostor ${i+1}`;
            const valueStr = tds[1] ? tds[1].textContent.trim() : '';
            
            let value = null;
            if (valueStr !== '' && !isNaN(parseFloat(valueStr))) {
                value = parseFloat(valueStr);
            }

            if (chart.data.datasets[i]) {
                chart.data.datasets[i].label = roomName;
                chart.data.datasets[i].data.push(value);
            }
        });

        chart.data.labels.push(time);

        // Omejitev števila točk
        if (chart.data.labels.length > maxPoints) {
            chart.data.labels.shift();
            chart.data.datasets.forEach(ds => {
                if (ds.data.length > 0) ds.data.shift();
            });
        }

        chart.update('none');
    }

    // ==================== Dodaj vse / Odstrani vse ====================
    function addAllRooms() {
        const select = document.getElementById('add-room');
        const tableBody = document.getElementById('delta-table');
        
        for (let i = 1; i < select.options.length; i++) {
            const option = select.options[i];
            const rowId = option.value;
            if (document.getElementById(rowId)) continue;

            const row = document.createElement('tr');
            row.id = rowId;
            row.draggable = true;
            row.ondragover = "dragOver(event)";
            row.ondragstart = "dragStart(event)";
            tableBody.appendChild(row);

            const roomName = option.innerHTML;
            row.innerHTML = `
                <td class="py-4 px-4 font-medium" style="cursor:pointer;">${roomName}</td>
                <td class="text-right py-4 px-4"></td>
                <td class="text-right py-4 px-4 text-xs text-slate-400"></td>
            `;

            // Takoj dodamo dataset z null vrednostmi (poravnava na desno)
            if (chart) {
                const padLength = chart.data.labels.length;
                const color = chartColors[chart.data.datasets.length % chartColors.length];
                chart.data.datasets.push({
                    label: roomName,
                    data: new Array(padLength).fill(null),
                    borderColor: color,
                    tension: 0.25,
                    borderWidth: 3,
                    pointRadius: 0,
                    fill: false
                });
            }

            row.classList.add('!text-emerald-400');
            setTimeout(() => row.classList.remove('!text-emerald-400'), 300);
            row.addEventListener('click', reloadChart);
        }
    }

    function removeAllRooms() {
        if (!confirm('Res želiš odstraniti vse prostore iz tabele in grafa?')) return;
        
        document.getElementById('delta-table').innerHTML = '';
        
        if (chart) {
            chart.data.labels = [];
            chart.data.datasets = [];
            chart.update();
        }
    }
    // =====================================================================

    document.getElementById('ref-sensor').addEventListener('change', function() {
        selectedParameter = parseInt(this.value) || null;
        referenceSensorId = null;
        referenceValue = 0;
        offset = 0;
        
        const tableBody = document.getElementById('delta-table');
        tableBody.innerHTML = "";
        
        if (chart) {
            chart.data.labels = [];
            chart.data.datasets = [];
            chart.update();
        }
    });

    document.getElementById('add-room').addEventListener('change', function() {
        if (!this.value) return;
        
        const tableBody = document.getElementById('delta-table');
        const rowId = this.value;
        
        if (document.getElementById(rowId)) {
            this.value = '';
            return;
        }

        const row = document.createElement('tr');
        row.id = rowId;
        row.draggable = true;
        row.ondragover = "dragOver(event)";
        row.ondragstart = "dragStart(event)";
        tableBody.appendChild(row);
        
        const roomName = this.options[this.options.selectedIndex].innerHTML;
        
        row.innerHTML = `
            <td class="py-4 px-4 font-medium" style="cursor:pointer;">${roomName}</td>
            <td class="text-right py-4 px-4"></td>
            <td class="text-right py-4 px-4 text-xs text-slate-400"></td>
        `;

        // Takoj dodamo dataset z null vrednostmi (poravnava na desno)
        if (chart) {
            const padLength = chart.data.labels.length;
            const color = chartColors[chart.data.datasets.length % chartColors.length];
            chart.data.datasets.push({
                label: roomName,
                data: new Array(padLength).fill(null),
                borderColor: color,
                tension: 0.25,
                borderWidth: 3,
                pointRadius: 0,
                fill: false
            });
        }

        row.classList.add('!text-emerald-400');
        setTimeout(() => row.classList.remove('!text-emerald-400'), 300);
        row.addEventListener('click', reloadChart);
        this.value = '';
    });

    function reloadChart() {
        const roomName = this.querySelector('td:first-child').textContent;
        document.getElementById('chart-name').innerHTML = `Graf vrednosti – ${roomName} in ostali`;
    }

    function zeroOffset() {
        const currentDelta = parseFloat(document.querySelector('.font-bold')?.textContent) || 0;
        offset = currentDelta;
        alert(`Offset nastavljen na ${offset.toFixed(2)} Pa`);
    }

    function resetOffset() {
        offset = 0;
        alert('Offset resetiran na 0 Pa');
    }

    function exportCSV() {
        if (!chart || chart.data.datasets.length === 0) {
            alert("Ni podatkov za izvoz!");
            return;
        }
        let csv = "Čas";
        chart.data.datasets.forEach(ds => csv += ";" + ds.label);
        csv += "\n";
        
        const numPoints = chart.data.labels.length;
        for (let i = 0; i < numPoints; i++) {
            csv += chart.data.labels[i];
            chart.data.datasets.forEach(ds => {
                csv += ";" + (ds.data[i] !== undefined && ds.data[i] !== null ? ds.data[i] : '');
            });
            csv += "\n";
        }
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "diferencial_tlak.csv";
        a.click();
    }

    function initChart() {
        const ctx = document.getElementById('deltaChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                scales: {
                    y: { beginAtZero: false, grid: { color: 'rgba(148,163,184,0.15)' } },
                    x: { grid: { color: 'rgba(148,163,184,0.15)' }, ticks: { maxRotation: 0 } }
                },
                plugins: { 
                    legend: { 
                        display: true, 
                        position: 'top',
                        labels: { color: '#e2e8f0', boxWidth: 12, padding: 15 }
                    } 
                }
            }
        });
    }

    window.onload = function() {
        initChart();
        connectWebSocket();
        setInterval(updateChart, 1000);
    };

    // Drag & drop
    var _el;
    function dragOver(e) {
      if (isBefore(_el, e.target))
        e.target.parentNode.insertBefore(_el, e.target);
      else
        e.target.parentNode.insertBefore(_el, e.target.nextSibling);
    }
    function dragStart(e) {
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", null);
      _el = e.target;
    }
    function isBefore(el1, el2) {
      if (el2.parentNode === el1.parentNode)
        for (var cur = el1.previousSibling; cur && cur.nodeType !== 9; cur = cur.previousSibling)
          if (cur === el2) return true;
      return false;
    }
</script>
{% endblock %}
