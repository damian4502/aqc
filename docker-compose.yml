services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: air_quality
      POSTGRES_USER: django
      POSTGRES_PASSWORD: geslo123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mqtt:
    image: eclipse-mosquitto:2
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DJANGO_SETTINGS_MODULE: config.settings

  mqtt-listener:
    build: .
    command: python mqtt_listener.py
    depends_on:
      - db
      - mqtt
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings

volumes:
  postgres_data: